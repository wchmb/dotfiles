start-at-login = true

after-login-command = []
after-startup-command = []

# https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30 # 0 to disable padding

default-root-container-layout = 'tiles' # tiles|accordion

default-root-container-orientation = 'auto' # horizontal|vertical|auto

# Mouse follows focus when focused monitor changes
# https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty' # qwerty|dvorak

# Gaps between windows (inner-*) and between monitor edges (outer-*).
[gaps]
    inner.horizontal = [{ monitor.built-in = 4 }, 5]
    inner.vertical =   [{ monitor.built-in = 4 }, 5]
    outer.left =       [{ monitor.built-in = 5 }, 6]
    outer.bottom =     [{ monitor.built-in = 5 }, 6]
    outer.top =        [{ monitor.built-in = 5 }, 6]
    outer.right =      [{ monitor.built-in = 5 }, 6]

# Assign workspaces to monitor
# https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
# Note: move-workspace-to-monitor has no effect for workspaces that have monitor assignment
[workspace-to-monitor-force-assignment]
    '1-Init'   = ['built-in', 'secondary']
    '2-Comms'  = ['built-in', 'secondary']
    '3-System' = ['built-in', 'secondary']
    '4'        = ['built-in', 'secondary']
    '5'        = ['built-in', 'secondary']
    '6'        = ['built-in', 'secondary']
    '7'        = ['main', 'built-in']
    '8'        = ['main', 'built-in']
    '9-Browse' = ['main', 'built-in']
    '0-Code'   = ['main', 'built-in']

# 'main' binding mode declaration
# https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
    #                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right
    # All possible modifiers: cmd, alt, ctrl, shift
    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # Open terminal
    # https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    alt-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

    # Layout
    # https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # Toggle full screen current window
    alt-f = 'fullscreen --no-outer-gaps'

    # Focus window
    # https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace left'
    alt-j = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace down'
    alt-k = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace up'
    alt-l = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace right'

    # Focus workspace
    # https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1-Init'
    alt-2 = 'workspace 2-Comms'
    alt-3 = 'workspace 3-System'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9-Browse'
    alt-0 = 'workspace 0-Code'
    # alt-q = 'workspace ●○○○'
    # alt-w = 'workspace ○●○○'
    # alt-e = 'workspace ○○●○'
    # alt-r = 'workspace ○○○●'
    alt-left   = 'workspace --wrap-around prev'
    alt-right  = 'workspace --wrap-around next'
    alt-tab    = 'workspace-back-and-forth'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-shift-1 = 'move-node-to-workspace 1-Init'
    alt-shift-2 = 'move-node-to-workspace 2-Comms'
    alt-shift-3 = 'move-node-to-workspace 3-System'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9-Browse'
    alt-shift-0 = 'move-node-to-workspace 0-Code'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-monitor
    alt-shift-left = 'move-node-to-monitor --focus-follows-window prev' # with arrows: like Win
    alt-shift-right = 'move-node-to-monitor --focus-follows-window next'
    # https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # Move window
    # https://nikitabobko.github.io/AeroSpace/commands#move
    # Split window
    # https://nikitabobko.github.io/AeroSpace/commands#join-with
    # Move window to workspace
    # https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    # Move window to monitor
    # https://nikitabobko.github.io/AeroSpace/commands#move-node-to-monitor
    # Note: move-workspace-to-monitor has no effect if [workspace-to-monitor-force-assignment]
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Change mode
    # https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'
    alt-r = 'mode resize'

# 'service' binding mode declaration.
# https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    r = ['flatten-workspace-tree', 'mode main'] # Reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    esc = ['reload-config', 'mode main']
    q   = 'mode main'

# 'resize' binding mode declaration.
[mode.resize.binding]
    minus = 'resize smart -50'
    equal = 'resize smart +50'
    h = 'resize smart -50'
    l = 'resize smart +50'
    j = 'resize smart-opposite -50'
    k = 'resize smart-opposite +50'

    esc = 'mode main'
    q   = 'mode main'

# Callbacks
# https://nikitabobko.github.io/AeroSpace/guide#callbacks
# Get app-id with: aerospace list-apps
[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace 1-Init'

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'move-node-to-workspace 1-Init'

[[on-window-detected]]
if.app-id = 'org.apple.mail'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-name-regex-substring = 'Messages'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-name-regex-substring = 'WhatsApp Web'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-name-regex-substring = 'FastS3'
run = 'move-node-to-workspace 2-Comms'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = 'move-node-to-workspace 3-System'

[[on-window-detected]]
if.app-id = 'com.apple.shortcuts'
run = 'move-node-to-workspace 3-System'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 9-Browse'

[[on-window-detected]]
if.app-id = 'org.gnu.Emacs'
run = 'move-node-to-workspace 0-Code'

[[on-window-detected]]
if.app-name-regex-substring = 'AI Studio'
run = ['move-node-to-workspace 0-Code']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.objective-see.lulu.app'
run = 'layout floating'
